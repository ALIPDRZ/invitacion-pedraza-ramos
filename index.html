<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{background:#fdf6e3;font-family:'Lato',sans-serif;color:#3a2e1e;}
.inv-wrap{max-width:680px;margin:0 auto;background:linear-gradient(160deg,#fffdf7 0%,#fdf6e3 50%,#fffdf7 100%);min-height:100vh;}
.header{background:#1a1208;color:#f5e6c8;text-align:center;padding:2.5rem 1.5rem 2rem;position:relative;overflow:hidden;}
.header::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#6b4f12,#d4a017,#f5e6c8,#d4a017,#6b4f12);}
.header::after{content:'';position:absolute;bottom:0;left:0;right:0;height:4px;background:linear-gradient(90deg,#6b4f12,#d4a017,#f5e6c8,#d4a017,#6b4f12);}
.header h1{font-family:'Playfair Display',serif;font-size:13px;font-weight:400;letter-spacing:4px;text-transform:uppercase;color:#d4a017;margin-bottom:.5rem;}
.header h2{font-family:'Playfair Display',serif;font-size:28px;font-weight:600;color:#f5e6c8;line-height:1.3;}
.header .subtitle{font-size:12px;letter-spacing:3px;text-transform:uppercase;color:#c9a84c;margin-top:.5rem;}
.divider-gold{display:flex;align-items:center;gap:12px;justify-content:center;margin:1.2rem auto;color:#d4a017;}
.divider-gold::before,.divider-gold::after{content:'';flex:1;max-width:80px;height:.5px;background:#d4a017;opacity:.6;}
.sacred-img{display:flex;justify-content:center;margin:.2rem 0 .4rem;}
.sacred-img img{width:110px;height:auto;opacity:.92;}
.frase-hero{background:#1a1208;text-align:center;padding:2rem;}
.frase-hero p{font-family:'Playfair Display',serif;font-style:italic;font-size:15px;line-height:1.8;color:#e8d5a3;}
.ninos-section{display:grid;grid-template-columns:1fr 1fr;}
.nino-card{position:relative;overflow:hidden;background:#0e0b05;}
.nino-card img{width:100%;height:280px;object-fit:cover;object-position:center top;display:block;opacity:.85;}
.nino-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(transparent,rgba(10,7,2,.92));padding:1.5rem 1rem 1rem;text-align:center;}
.nino-label .sacramento{font-size:10px;letter-spacing:3px;text-transform:uppercase;color:#d4a017;display:block;margin-bottom:4px;}
.nino-label .nombre{font-family:'Playfair Display',serif;font-size:15px;font-weight:600;color:#f5e6c8;line-height:1.3;}
.section{padding:2rem 1.5rem;border-bottom:.5px solid #e8d5a340;}
.section-title{font-family:'Playfair Display',serif;font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#b8860b;text-align:center;margin-bottom:1.2rem;}
.programa-grid{display:grid;grid-template-columns:1fr 1fr;gap:1rem;}
.prog-item{background:#fdf8ee;border:.5px solid #d4a01740;border-radius:8px;padding:1rem;text-align:center;}
.prog-icon{font-size:22px;margin-bottom:6px;color:#b8860b;}
.prog-hora{font-family:'Playfair Display',serif;font-size:18px;font-weight:600;color:#b8860b;display:block;margin-bottom:4px;}
.prog-evento{font-size:12px;letter-spacing:1px;text-transform:uppercase;color:#5a4a2a;display:block;margin-bottom:4px;}
.prog-lugar{font-size:12px;color:#8a7050;line-height:1.4;}
.frase-2{background:#fdf8ee;border-left:3px solid #d4a017;padding:1.2rem 1.5rem;margin:0 1.5rem 1.5rem;border-radius:0 8px 8px 0;}
.frase-2 p{font-family:'Playfair Display',serif;font-style:italic;font-size:13px;color:#5a4a2a;line-height:1.7;}
.padrinos-grid{display:grid;grid-template-columns:1fr 1fr;gap:1.2rem;}
.padrino-group{background:#fdf8ee;border:.5px solid #d4a01740;border-radius:8px;padding:1rem;}
.padrino-group h4{font-size:10px;letter-spacing:2px;text-transform:uppercase;color:#b8860b;margin-bottom:8px;display:flex;align-items:center;gap:6px;}
.padrino-group .nombre-pad{font-size:12px;color:#3a2e1e;line-height:1.8;}
.padres{text-align:center;padding:2rem 1.5rem;}
.padres .con-amor{font-size:11px;letter-spacing:3px;text-transform:uppercase;color:#b8860b;margin-bottom:.8rem;display:block;}
.padres .nombres-padres{font-family:'Playfair Display',serif;font-size:18px;color:#3a2e1e;line-height:1.6;}
.padres .amp{font-style:italic;color:#b8860b;font-size:22px;}
.mapa-section{padding:0 1.5rem 2rem;}
.mapa-tabs{display:flex;gap:8px;margin-bottom:1rem;}
.tab-btn{flex:1;padding:8px 12px;font-size:11px;letter-spacing:1px;text-transform:uppercase;border:.5px solid #d4a017;border-radius:6px;background:transparent;color:#b8860b;cursor:pointer;font-family:'Lato',sans-serif;transition:all .2s;}
.tab-btn.active{background:#b8860b;color:#fdf8ee;border-color:#b8860b;}
.map-frame{border-radius:10px;overflow:hidden;border:.5px solid #d4a01740;height:220px;display:none;}
.map-frame.active{display:block;}
.map-frame iframe{width:100%;height:100%;border:none;}
.map-link{display:inline-block;margin-top:8px;font-size:12px;color:#b8860b;letter-spacing:1px;text-decoration:none;}
.map-link:hover{text-decoration:underline;}
.frase-oracion{background:#1a1208;padding:2rem;text-align:center;}
.frase-oracion p{font-family:'Playfair Display',serif;font-style:italic;font-size:14px;color:#e8d5a3;line-height:1.9;max-width:500px;margin:0 auto;}
.oracion-icon{display:flex;justify-content:center;margin-bottom:1rem;}
.oracion-icon img{width:60px;height:auto;opacity:.75;}
.rsvp-section{padding:2rem 1.5rem;background:#fffdf7;}
.rsvp-form{display:flex;flex-direction:column;gap:12px;}
.rsvp-form input,.rsvp-form select{font-family:'Lato',sans-serif;font-size:14px;border:.5px solid #d4a017;border-radius:8px;padding:10px 14px;background:#fdf8ee;color:#3a2e1e;width:100%;}
.rsvp-form input::placeholder{color:#a08060;}
.rsvp-form input:focus,.rsvp-form select:focus{outline:none;border-color:#b8860b;box-shadow:0 0 0 2px #d4a01722;}
.asistentes-box{border:.5px solid #d4a017;border-radius:10px;padding:14px;background:#fdf8ee;}
.asistentes-nota-principal{font-size:12px;color:#6b5030;letter-spacing:.3px;margin-bottom:4px;display:flex;align-items:flex-start;gap:6px;line-height:1.5;}
.asistentes-nota-principal i{color:#b8860b;font-size:14px;margin-top:1px;flex-shrink:0;}
.asistentes-subnota{font-family:'Playfair Display',serif;font-style:italic;font-size:11px;color:#a08060;margin-bottom:12px;padding-left:20px;line-height:1.5;}
.asistentes-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.asistente-field{display:flex;flex-direction:column;gap:4px;}
.asistente-label{font-size:11px;letter-spacing:1.5px;text-transform:uppercase;color:#b8860b;}
.asistente-field input{border:.5px solid #d4a01760;border-radius:6px;padding:8px 10px;background:#fffdf7;font-family:'Lato',sans-serif;font-size:14px;color:#3a2e1e;width:100%;}
.asistente-field input:focus{outline:none;border-color:#b8860b;box-shadow:0 0 0 2px #d4a01722;}
.input-disabled{opacity:.35;pointer-events:none;}
.btn-confirmar{background:#1a1208;color:#d4a017;border:none;border-radius:8px;padding:13px;font-family:'Playfair Display',serif;font-size:14px;letter-spacing:2px;text-transform:uppercase;cursor:pointer;width:100%;margin-top:4px;transition:opacity .2s;}
.btn-confirmar:hover{opacity:.85;}
.success-msg{display:none;background:#fdf8ee;border:.5px solid #d4a017;border-radius:10px;padding:1.5rem;text-align:center;margin-top:1rem;}
.success-msg .check{font-size:36px;margin-bottom:8px;}
.success-msg p{font-family:'Playfair Display',serif;font-style:italic;color:#5a4a2a;font-size:14px;line-height:1.6;}
.footer{background:#0e0b05;text-align:center;padding:1.5rem;color:#6b5a30;font-size:11px;letter-spacing:2px;text-transform:uppercase;}
</style>
</head>
